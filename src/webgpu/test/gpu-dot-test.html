<!DOCTYPE html>
<html><head><title>GPU Dot Product Test</title></head>
<body>
<pre id="out">Testing...</pre>
<script>
const shader = `
@group(0) @binding(0) var<storage, read> a: array<f32>;
@group(0) @binding(1) var<storage, read> b: array<f32>;
@group(0) @binding(2) var<storage, read_write> out: array<f32>;

@compute @workgroup_size(1)
fn main() {
  var sum: f32 = 0.0;
  for (var i = 0u; i < 2048u; i++) {
    sum += a[i] * b[i];
  }
  out[0] = sum;
}
`;

(async () => {
  const out = document.getElementById('out');
  const adapter = await navigator.gpu.requestAdapter();
  const device = await adapter.requestDevice();

  // Create test data — use actual model-like values
  const N = 2048;
  const aData = new Float32Array(N);
  const bData = new Float32Array(N);
  for (let i = 0; i < N; i++) {
    aData[i] = (Math.random() - 0.5) * 0.04;
    bData[i] = (Math.random() - 0.5) * 0.1;
  }

  // CPU f64 reference
  let cpuF64 = 0;
  for (let i = 0; i < N; i++) cpuF64 += aData[i] * bData[i];

  // CPU Math.fround reference
  let cpuF32 = Math.fround(0);
  for (let i = 0; i < N; i++) cpuF32 = Math.fround(cpuF32 + Math.fround(aData[i] * bData[i]));

  // GPU compute
  const aBuf = device.createBuffer({ size: N*4, usage: GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST });
  const bBuf = device.createBuffer({ size: N*4, usage: GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_DST });
  const outBuf = device.createBuffer({ size: 4, usage: GPUBufferUsage.STORAGE|GPUBufferUsage.COPY_SRC });
  const readBuf = device.createBuffer({ size: 4, usage: GPUBufferUsage.MAP_READ|GPUBufferUsage.COPY_DST });

  device.queue.writeBuffer(aBuf, 0, aData);
  device.queue.writeBuffer(bBuf, 0, bData);

  const module = device.createShaderModule({ code: shader });
  const layout = device.createBindGroupLayout({ entries: [
    { binding: 0, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'read-only-storage' } },
    { binding: 1, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'read-only-storage' } },
    { binding: 2, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'storage' } },
  ]});
  const pipeline = device.createComputePipeline({
    layout: device.createPipelineLayout({ bindGroupLayouts: [layout] }),
    compute: { module, entryPoint: 'main' },
  });
  const bindGroup = device.createBindGroup({ layout, entries: [
    { binding: 0, resource: { buffer: aBuf } },
    { binding: 1, resource: { buffer: bBuf } },
    { binding: 2, resource: { buffer: outBuf } },
  ]});

  const encoder = device.createCommandEncoder();
  const pass = encoder.beginComputePass();
  pass.setPipeline(pipeline);
  pass.setBindGroup(0, bindGroup);
  pass.dispatchWorkgroups(1);
  pass.end();
  encoder.copyBufferToBuffer(outBuf, 0, readBuf, 0, 4);
  device.queue.submit([encoder.finish()]);

  await readBuf.mapAsync(GPUMapMode.READ);
  const gpuResult = new Float32Array(readBuf.getMappedRange().slice(0))[0];
  readBuf.unmap();

  out.textContent = [
    'Dot product of 2048 random f32 values:',
    '  CPU f64:     ' + cpuF64,
    '  CPU fround:  ' + cpuF32,
    '  GPU f32:     ' + gpuResult,
    '',
    '  GPU == fround: ' + (gpuResult === cpuF32),
    '  GPU - fround:  ' + (gpuResult - cpuF32),
    '  GPU - f64:     ' + (gpuResult - cpuF64),
  ].join('\n');
})();
</script>
</body></html>
